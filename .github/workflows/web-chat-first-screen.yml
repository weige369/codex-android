name: Web Chat First-Screen Budget
on:
  pull_request:
    paths:
      - "web-chat/**"
      - ".github/workflows/web-chat-first-screen.yml"
  workflow_dispatch:
jobs:
  first-screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-chat/package-lock.json
      - name: Install dependencies
        run: npm --prefix web-chat ci
      - name: Build web-chat
        run: npm --prefix web-chat run build
      - name: Check first-screen size budget
        run: npm --prefix web-chat run measure:check
