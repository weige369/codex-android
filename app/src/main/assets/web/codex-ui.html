<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>Codex Android</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a2e;
    --border: #2a2a3e;
    --text: #e0e0e0;
    --text-dim: #8888aa;
    --primary: #6c5ce7;
    --primary-dim: #4a3db8;
    --accent: #00d4aa;
    --error: #ff4757;
    --warning: #ffa502;
    --success: #2ed573;
    --font: 'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* Status Bar */
  #status-bar {
    display: flex;
    align-items: center;
    padding: 6px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 8px;
    flex-shrink: 0;
  }
  #status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  #status-dot.disconnected { background: var(--text-dim); }
  #status-dot.connecting { background: var(--warning); animation: pulse 1s infinite; }
  #status-dot.connected { background: var(--success); }
  #status-dot.error { background: var(--error); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #status-text {
    font-size: 12px;
    color: var(--text-dim);
    flex: 1;
  }
  #status-version {
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.6;
  }
  #menu-btn {
    background: none; border: none; color: var(--text-dim);
    font-size: 20px; cursor: pointer; padding: 2px 6px;
    border-radius: 4px;
  }
  #menu-btn:hover { background: var(--border); color: var(--text); }

  /* Messages Area */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
  }
  .msg {
    padding: 10px 14px;
    border-radius: 8px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    max-width: 100%;
    animation: fadeIn 0.2s;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .msg.user {
    background: var(--primary-dim);
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 2px;
  }
  .msg.assistant {
    background: var(--surface2);
    color: var(--text);
    align-self: flex-start;
    border-bottom-left-radius: 2px;
  }
  .msg.system {
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    text-align: center;
    padding: 4px;
  }
  .msg.error {
    background: rgba(255,71,87,0.15);
    color: var(--error);
    border: 1px solid rgba(255,71,87,0.3);
    align-self: flex-start;
  }
  .msg.thinking {
    background: var(--surface2);
    color: var(--accent);
    font-size: 13px;
    opacity: 0.8;
  }
  .msg-stream {
    background: var(--surface2);
    color: var(--accent);
    align-self: flex-start;
    border-left: 3px solid var(--accent);
  }
  .msg .timestamp {
    font-size: 10px;
    color: var(--text-dim);
    opacity: 0.5;
    margin-top: 4px;
    display: block;
  }

  /* Code blocks in messages */
  .msg pre {
    background: rgba(0,0,0,0.3);
    padding: 8px 12px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 6px 0;
    font-size: 12px;
    border: 1px solid var(--border);
  }
  .msg code {
    background: rgba(0,0,0,0.3);
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 12px;
  }

  /* Input Area */
  #input-area {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 8px 12px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #input-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2px;
  }
  #input-wrap:focus-within {
    border-color: var(--primary);
  }
  #prompt-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 10px 12px;
    resize: none;
    max-height: 120px;
    min-height: 20px;
    line-height: 1.4;
  }
  #prompt-input::placeholder { color: var(--text-dim); opacity: 0.5; }
  #send-btn {
    background: var(--primary);
    border: none;
    color: #fff;
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin: 2px;
    transition: background 0.2s;
  }
  #send-btn:disabled {
    background: var(--border);
    cursor: not-allowed;
    opacity: 0.5;
  }
  #send-btn:not(:disabled):hover { background: var(--primary-dim); }
  #send-btn svg { width: 18px; height: 18px; fill: currentColor; }

  /* Dropdown Menu */
  #menu-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    display: none;
  }
  #menu-overlay.open { display: block; }
  #menu {
    position: fixed;
    top: 0; right: 0;
    width: 260px;
    height: 100dvh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 101;
    transform: translateX(100%);
    transition: transform 0.25s ease;
    display: flex;
    flex-direction: column;
  }
  #menu.open { transform: translateX(0); }
  #menu-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #menu-close {
    background: none; border: none; color: var(--text-dim);
    font-size: 22px; cursor: pointer;
  }
  #menu-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text);
    font-size: 13px;
    transition: background 0.15s;
  }
  .menu-item:hover { background: var(--surface2); }
  .menu-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .menu-divider {
    height: 1px;
    background: var(--border);
    margin: 6px 8px;
  }

  /* Welcome Screen */
  #welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  #welcome.hidden { display: none; }
  #welcome-logo {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 16px;
  }
  #welcome h1 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  #welcome p {
    color: var(--text-dim);
    font-size: 13px;
    max-width: 280px;
    line-height: 1.5;
    margin-bottom: 20px;
  }
  .welcome-hint {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-dim);
    font-size: 12px;
    padding: 6px 12px;
    background: var(--surface2);
    border-radius: 20px;
  }
  .welcome-hint kbd {
    background: var(--border);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* Responsive */
  @media (max-width: 480px) {
    #messages { padding: 8px; }
    .msg { font-size: 13px; padding: 8px 10px; }
  }
</style>
</head>
<body>

<!-- Status Bar -->
<div id="status-bar">
  <div id="status-dot" class="disconnected"></div>
  <span id="status-text">未连接</span>
  <span id="status-version">Codex v0.133.0</span>
  <button id="menu-btn" onclick="toggleMenu()">⚙</button>
</div>

<!-- Messages Area -->
<div id="messages" style="display:none"></div>

<!-- Welcome Screen -->
<div id="welcome">
  <div id="welcome-logo">C</div>
  <h1>Codex Android</h1>
  <p>AI 编码代理 • 在 Android 上运行 Codex CLI</p>
  <div class="welcome-hint">
    <kbd>Enter</kbd> 发送 &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> 换行
  </div>
</div>

<!-- Input Area -->
<div id="input-area">
  <div id="input-wrap">
    <textarea id="prompt-input" rows="1" placeholder="输入 prompt 与 Codex 对话..." disabled></textarea>
    <button id="send-btn" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- Menu Overlay -->
<div id="menu-overlay" onclick="toggleMenu()"></div>
<div id="menu">
  <div id="menu-header">
    <span>Codex Android</span>
    <button id="menu-close" onclick="toggleMenu()">✕</button>
  </div>
  <div id="menu-body">
    <div class="menu-item" onclick="toggleMenu();clearMessages()">
      <span class="icon">🗑</span> 清除对话
    </div>
    <div class="menu-item" onclick="toggleMenu();newSession()">
      <span class="icon">➕</span> 新建会话
    </div>
    <div class="menu-divider"></div>
    <div class="menu-item" onclick="toggleMenu();showAbout()">
      <span class="icon">ℹ</span> 关于
    </div>
  </div>
</div>

<script>
// ========== State ==========
// ========== Mode Detection ==========
const API_MODE = window.CODEX_API_MODE || false;
const WS_PORT = window.CODEX_WS_PORT || 9877;
let ws = null;
let isConnected = false;
let isProcessing = false;
let streamBuffer = '';
let reconnectTimer = null;
let messageHistory = [];

// ========== API Mode Tools ==========
function connectToApi() {
  console.log('API mode: connected');
  addSystemMessage('已连接到 Codex API');
  isConnected = true;
  updateStatus('connected', 'API 已连接');
  document.getElementById('prompt-input').disabled = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('prompt-input').focus();
}

function sendViaApi(text) {
  const msg = JSON.stringify({ type: 'prompt', data: text });
  const result = callBridge('postMessage', msg);
  return result !== null && result !== false;
}

function cancelApiStream() {
  callBridge('postMessage', JSON.stringify({ type: 'cancel' }));
}

function clearApiHistory() {
  callBridge('postMessage', JSON.stringify({ type: 'clear' }));
}

// ========== Bridge (Android <-> JS) ==========
const bridge = window.CodexAndroidBridge || {};

function callBridge(method, ...args) {
  if (bridge[method]) {
    try { return bridge[method](...args); }
    catch(e) { console.warn('Bridge call failed:', method, e); }
  }
  return null;
}

// Android calls these on status changes
window.onCodexStatusUpdate = function(state, wsPort, running) {
  if (wsPort) window.CODEX_WS_PORT = wsPort;
  console.log('Codex status:', state, 'port:', wsPort, 'running:', running);
  if (running) connectWebSocket();
};

window.onCodexBridgeState = function(state) {
  console.log('Bridge state:', state);
  updateStatus(state === 'CONNECTED' ? 'connected' : 'disconnected', state);
};

window.onCodexMessage = function(message) {
  // Forward WebSocket messages from Android bridge to WebSocket handler
  if (ws && ws.readyState === WebSocket.OPEN) {
    // Message from Android bridge, treat as WebSocket message
    handleWsMessage({ data: message });
  }
};

// ========== WebSocket ==========
function connectWebSocket() {
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;

  updateStatus('connecting', '正在连接...');

  const url = `ws://127.0.0.1:${WS_PORT}`;
  console.log('Connecting to Codex WS:', url);

  try {
    ws = new WebSocket(url);

    ws.onopen = function() {
      console.log('WebSocket connected');
      isConnected = true;
      updateStatus('connected', '已连接');
      document.getElementById('prompt-input').disabled = false;
      document.getElementById('send-btn').disabled = false;
      document.getElementById('prompt-input').focus();
      addSystemMessage('已连接到 Codex exec-server');
    };

    ws.onmessage = function(event) {
      handleWsMessage(event);
    };

    ws.onerror = function(err) {
      console.error('WebSocket error:', err);
      updateStatus('error', '连接错误');
    };

    ws.onclose = function() {
      console.log('WebSocket closed');
      isConnected = false;
      isProcessing = false;
      document.getElementById('send-btn').disabled = true;
      document.getElementById('prompt-input').disabled = true;
      updateStatus('disconnected', '连接已断开');
      scheduleReconnect();
    };
  } catch(e) {
    console.error('WebSocket creation failed:', e);
    updateStatus('error', '创建连接失败');
    scheduleReconnect();
  }
}

function scheduleReconnect() {
  if (reconnectTimer) clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(function() {
    if (!isConnected) {
      updateStatus('connecting', '正在重连...');
      connectWebSocket();
    }
  }, 3000);
}

function sendWsMessage(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    const str = typeof msg === 'string' ? msg : JSON.stringify(msg);
    ws.send(str);
    return true;
  }
  return false;
}

// ========== Message Handling ==========
function handleWsMessage(event) {
  let data;
  try {
    data = JSON.parse(event.data);
  } catch(e) {
    // Plain text message
    addStreamChunk(event.data);
    return;
  }

  // JSON-RPC response
  if (data.jsonrpc === '2.0') {
    if (data.method === 'response' && data.params) {
      const content = data.params.content || '';
      if (data.params.done) {
        finishStreaming();
      } else {
        addStreamChunk(content);
      }
    }
    // Request response with id
    else if (data.id) {
      if (data.result) {
        addStreamChunk(typeof data.result === 'string' ? data.result : JSON.stringify(data.result, null, 2));
        finishStreaming();
      } else if (data.error) {
        addErrorMessage('错误: ' + (data.error.message || JSON.stringify(data.error)));
        isProcessing = false;
      } else {
        // Empty response, just finish
        finishStreaming();
      }
    }
  } else {
    // Non-JSON-RPC message
    addStreamChunk(JSON.stringify(data, null, 2));
  }
}

// ========== UI Updates ==========
function updateStatus(state, text) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = state;
  txt.textContent = text || state;
}

function addMessage(html, cls) {
  const container = document.getElementById('messages');
  const welcome = document.getElementById('welcome');

  welcome.classList.add('hidden');
  container.style.display = 'flex';

  const div = document.createElement('div');
  div.className = 'msg ' + (cls || '');
  div.innerHTML = html;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function addSystemMessage(text) {
  const ts = new Date().toLocaleTimeString();
  addMessage(text + ' <span class="timestamp">' + ts + '</span>', 'system');
}

function addUserMessage(text) {
  const ts = new Date().toLocaleTimeString();
  const escaped = escapeHtml(text);
  addMessage(escaped + ' <span class="timestamp">' + ts + '</span>', 'user');
}

function addAssistantMessage(text) {
  const ts = new Date().toLocaleTimeString();
  const formatted = formatMessage(text);
  addMessage(formatted + ' <span class="timestamp">' + ts + '</span>', 'assistant');
}

function addErrorMessage(text) {
  addMessage(escapeHtml(text), 'error');
}

function addStreamChunk(text) {
  const container = document.getElementById('messages');
  const welcome = document.getElementById('welcome');
  welcome.classList.add('hidden');
  container.style.display = 'flex';

  // Find or create stream message
  let streamEl = container.querySelector('.msg-stream:last-child');
  if (!streamEl) {
    streamEl = document.createElement('div');
    streamEl.className = 'msg msg-stream';
    container.appendChild(streamEl);
  }

  // Handle markdown code blocks
  streamBuffer += text;
  streamEl.innerHTML = formatMessage(streamBuffer);

  container.scrollTop = container.scrollHeight;
}

function finishStreaming() {
  const container = document.getElementById('messages');
  const streamEl = container.querySelector('.msg-stream:last-child');
  if (streamEl) {
    streamEl.className = 'msg assistant';
    // Add timestamp
    const ts = new Date().toLocaleTimeString();
    streamEl.innerHTML += ' <span class="timestamp">' + ts + '</span>';
  }
  streamBuffer = '';
  isProcessing = false;
  updateSendButton();
}

// ========== Message Formatting ==========
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatMessage(text) {
  if (!text) return '';
  let html = escapeHtml(text);

  // Code blocks
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, function(match, lang, code) {
    const escaped = escapeHtml(code);
    return '<pre><code>' + escaped + '</code></pre>';
  });

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

  // Lists
  html = html.replace(/^- (.+)$/gm, '• $1');

  return html;
}

// ========== Send / Input ==========
function sendPrompt() {
  const input = document.getElementById('prompt-input');
  const text = input.value.trim();
  if (!text || isProcessing) return;

  addUserMessage(text);
  input.value = '';
  input.style.height = 'auto';
  isProcessing = true;
  updateSendButton();

  // Try API mode first (native bridge)
  if (API_MODE) {
    if (sendViaApi(text)) {
      return;
    }
    // API mode fallback to WebSocket
  }

  // Try WebSocket
  if (isConnected && sendWsMessage(text)) {
    return;
  }

  addErrorMessage('无法发送消息：未连接到 Codex');
  isProcessing = false;
  updateSendButton();
}

function updateSendButton() {
  const btn = document.getElementById('send-btn');
  btn.disabled = !isConnected || isProcessing;
}

// ========== Menu Actions ==========
function toggleMenu() {
  document.getElementById('menu-overlay').classList.toggle('open');
  document.getElementById('menu').classList.toggle('open');
}

function clearMessages() {
  document.getElementById('messages').style.display = 'none';
  document.getElementById('messages').innerHTML = '';
  document.getElementById('welcome').classList.remove('hidden');
  streamBuffer = '';
}

function newSession() {
  clearMessages();
  addSystemMessage('新会话已开始');
}

function showAbout() {
  addSystemMessage('Codex Android v0.133.0 — 基于 OpenAI Codex CLI');
}

// ========== Auto-resize textarea ==========
const input = document.getElementById('prompt-input');
input.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendPrompt();
  }
});
document.getElementById('send-btn').addEventListener('click', sendPrompt);

// ========== Init ==========
updateStatus('disconnected', '等待 Codex 运行时...');

// Auto-connect
if (API_MODE) {
  if (callBridge('isConfigured')) {
    connectToApi();
  }
} else if (callBridge('isCodexReady')) {
  connectWebSocket();
}

// ========== API Stream Handler ==========
// Called from Android native bridge via evaluateJavascript
window.onCodexStreamMessage = function(chunk) {
  if (chunk === '__STREAM_END__') {
    finishStreaming();
    return;
  }
  if (chunk === '__STREAM_CANCELLED__') {
    addSystemMessage('已取消');
    streamBuffer = '';
    isProcessing = false;
    updateSendButton();
    return;
  }
  addStreamChunk(chunk);
};

window.onCodexApiError = function(error) {
  addErrorMessage('API 错误: ' + error);
  streamBuffer = '';
  isProcessing = false;
  updateSendButton();
};

// Override updateSendButton for API mode
const _origUpdateSend = updateSendButton;
updateSendButton = function() {
  const btn = document.getElementById('send-btn');
  if (API_MODE && isConnected) {
    btn.disabled = isProcessing;
  } else {
    _origUpdateSend();
  }
};

console.log('Codex Android UI loaded. API mode:', API_MODE, 'WS port:', WS_PORT);
</script>
</body>
</html>
